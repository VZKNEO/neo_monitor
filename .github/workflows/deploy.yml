name: Deploy NEO Monitor

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # permite rodar manualmente pelo GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Injetar API key no index.html
        # Substitui o placeholder pelo secret — a key NUNCA aparece nos logs
        # porque o GitHub Actions mascara automaticamente o valor de secrets
        run: |
          sed -i "s|__GEMINI_API_KEY__|${{ secrets.GEMINI_API_KEY }}|g" index.html

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Publicar no GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # publica tudo na raiz do repo (index.html + site_data.json)

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
